name: Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  api-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore LeboncoinAPI/LeboncoinAPI.sln

    - name: Build
      run: dotnet build LeboncoinAPI/LeboncoinAPI.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test LeboncoinAPI/LeboncoinAPI.sln --no-build --configuration Release --verbosity normal

    - name: dotnet publish
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: dotnet publish LeboncoinAPI/LeboncoinAPI/LeboncoinAPI.csproj --no-build -c Release -o ${{env.DOTNET_ROOT}}/myapp

    - name: Upload artifact for deployment job
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: .net-app
        path: ${{env.DOTNET_ROOT}}/myapp

  client-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: LeboncoinClient/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: LeboncoinClient

    - name: Build
      run: npm run build
      working-directory: LeboncoinClient

    - name: Test
      run: npm run test:unit -- --run
      working-directory: LeboncoinClient

  deploy-api:
    runs-on: ubuntu-latest
    needs: [api-ci, client-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'LeboncoinAPI'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C246180F5E87403CBC1106A17CE8D597 }}
