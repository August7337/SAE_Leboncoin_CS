# =============================================================================
# docker-compose.yml — LeboncoinAPI + PostgreSQL
# Utilisation : cd docker && cp .env.example .env && docker compose up -d
# =============================================================================

services:

  # ─── Base de données PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: leboncoin_db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      # Améliore les performances de démarrage du conteneur PostgreSQL
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - leboncoin_net

    # ── Optimisations PostgreSQL pour tests de charge ───────────────────────
    # Ajuste les paramètres selon la RAM disponible sur votre serveur de test
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=500
        -c log_connections=off
        -c log_disconnections=off
        -c log_statement=none

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -q"]
      interval:     10s
      timeout:      5s
      retries:      10
      start_period: 20s

    # ── Limites ressources (ajuster selon votre serveur de test) ────────────
    deploy:
      resources:
        limits:
          cpus:   '2.0'
          memory: 1G
        reservations:
          cpus:   '0.5'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # ─── API .NET 8 ──────────────────────────────────────────────────────────────
  api:
    build:
      context:    ..                    # Racine du workspace (contexte de build)
      dockerfile: docker/Dockerfile.api # Chemin relatif au contexte
    container_name: leboncoin_api
    restart: unless-stopped

    ports:
      - "${API_PORT:-8080}:8080"        # Seul port exposé à l'hôte

    environment:
      # Kestrel écoute sur ce port (cf. Program.cs)
      PORT: "8080"

      # Connexion base de données  — DB_HOST = nom du service Docker
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ISSUER:     ${JWT_ISSUER:-LeboncoinAPI}
      JWT_AUDIENCE:   ${JWT_AUDIENCE:-LeboncoinVueApp}

      # Services tiers (laisser vide si non utilisés)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}

      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}

      # Logging structuré (utile pour analyser les résultats de charge)
      Logging__LogLevel__Default:              Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: Warning

    depends_on:
      db:
        condition: service_healthy    # Attend que le healthcheck DB soit OK

    networks:
      - leboncoin_net

    # ── Limites ressources pour tests de charge ──────────────────────────────
    # Adapter cpus/memory selon ce que vous voulez mesurer :
    #   - Réduire pour simuler un serveur low-cost
    #   - Augmenter pour tester les limites hautes
    deploy:
      resources:
        limits:
          cpus:   '2.0'
          memory: 512M
        reservations:
          cpus:   '0.5'
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"


# ─── Réseau interne (isolé, pas d'exposition inutile) ───────────────────────
networks:
  leboncoin_net:
    driver: bridge


# ─── Volumes persistants ─────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
